    <script>
        function updateKlabcCountdown() {
            const timerElement = document.getElementById('timer-klabc');
            if (!timerElement) return;

            const now = new Date();
            const year = now.getFullYear();
            let month = now.getMonth();

            const targetDate = new Date(year, month, 28, 0, 19, 0, 0);
            if (now >= targetDate) {
                month += 1;
            }
            const nextTarget = new Date(year, month, 28, 0, 19, 0, 0);

            const diff = nextTarget - now;
            if (diff <= 0) {
                timerElement.textContent = '0 Day 00:00:00';
                return;
            }

            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const padded = (value) => String(value).padStart(2, '0');
            timerElement.textContent = `${days} Day ${padded(hours)}:${padded(minutes)}:${padded(seconds)}`;
        }

        updateKlabcCountdown();
        setInterval(updateKlabcCountdown, 1000);
    </script>
